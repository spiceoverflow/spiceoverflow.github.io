---
layout: default
---

<article>
  <header class="post-header">
    <time>{{ page.date | date: "%B %-d, %Y" }}</time>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-back">
    <a href="{{ '/' | relative_url }}">&larr; Back to writing</a>
  </div>
</article>
