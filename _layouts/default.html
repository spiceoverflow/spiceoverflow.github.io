<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — spiceoverflow{% else %}spiceoverflow — Mo Sakr{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var s = localStorage.getItem('sp-theme');
      var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>

  <header>
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="site-name">spiceoverflow</span>
        <span class="site-author">Mo Sakr</span>
      </a>
      <nav>
        <a href="{{ '/' | relative_url }}"
           class="nav-link{% if page.url == '/' or page.layout == 'post' %} active{% endif %}">Writing</a>
        <a href="{{ '/about/' | relative_url }}"
           class="nav-link{% if page.url contains 'about' %} active{% endif %}">About</a>
        <a href="{{ '/cves/' | relative_url }}"
           class="nav-link{% if page.url contains 'cves' %} active{% endif %}">CVEs</a>
        <a href="{{ '/contact/' | relative_url }}"
           class="nav-link{% if page.url contains 'contact' %} active{% endif %}">Contact</a>
        <button id="theme-toggle" aria-label="Toggle theme"></button>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    {{ content }}
  </main>

  <footer>
    <div class="container footer-inner">
      <span class="footer-copy">&copy; {{ site.time | date: '%Y' }} Mo Sakr</span>
      <div class="footer-links">
        <a href="https://hackerone.com/spiceoverflow" target="_blank" rel="noopener noreferrer">HackerOne</a>
        <a href="https://x.com/spiceoverflow" target="_blank" rel="noopener noreferrer">X</a>
        <a href="https://www.linkedin.com/in/mo--sakr/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
